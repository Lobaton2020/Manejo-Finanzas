apiVersion: apps/v1
kind: Deployment
metadata:
  name: manejo-finanzas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: manejo-finanzas
  template:
    metadata:
      labels:
        app: manejo-finanzas
    spec:
      containers:
        - name: php-apache
          image: aflobaton/manejo-finanzas:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: env-file
              mountPath: /var/www/html/.env
              subPath: .env
              readOnly: true
            - name: php-config
              mountPath: /usr/local/etc/php/php.ini
              subPath: php.ini
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: env-file
          secret:
            secretName: manejo-finanzas-secrets
        - name: php-config
          configMap:
            name: php-config
            items:
              - key: php.ini
                path: php.ini
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: manejo-finanzas-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: manejo-finanzas
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80