[PHP]
error_reporting = E_ALL & ~E_STRICT & ~E_DEPRECATED
display_errors = Off
display_startup_errors = On
log_errors = On
html_errors = Off
memory_limit = -1
short_open_tag = Off
output_buffering = 4096
max_execution_time = 0
date.timezone = America/Bogota

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128